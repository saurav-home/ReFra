name: Nightly CI

on:
  push:
   branches:
    - nightly

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      versionCode: ${{ steps.versioncode.outputs.versionCode }}
      versionName: ${{ steps.versionname.outputs.versionName }}
    steps:
      - uses: actions/checkout@v6
      - name: Get versionCode
        id: versioncode
        run: echo "versionCode=$(grep -E '^\s+versionCode\s*=' app/build.gradle.kts | awk '{ print $3 }' | head -n 1)" >> $GITHUB_OUTPUT
      - name: Get versionName
        id: versionname
        run: echo "versionName=$(grep -E '^\s+versionName\s*=' app/build.gradle.kts | head -1 | awk -F\" '{ print $2 }')" >> $GITHUB_OUTPUT

  build_nomaps:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        arch: [Arm64-v8a, Armeabi-v7a, X86_64, X86, Universal]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/powershell || true
      - name: Add swap
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
      - name: Tune Gradle for CI
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties
      - name: Strip internet permission
        run: chmod +x ./strip_permission.sh && ./strip_permission.sh
      - name: Disable maps
        run: echo "INCLUDE_MAPS=false" >> ./app.properties
      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: 'release_key.jks'
          fileDir: 'app/'
          encodedString: ${{ secrets.SIGNING_KEY }}
      - name: Build Release APK
        run: ./gradlew --build-cache :app:assemble${{ matrix.arch }}NoMLRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      - uses: actions/upload-artifact@v5
        with:
          name: nomaps-${{ matrix.arch }}
          path: app/build/outputs/apk-renamed/**/*.apk

  build_withml:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        arch: [Arm64-v8a, Armeabi-v7a, X86_64, X86, Universal]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/powershell || true
      - name: Add swap
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
      - name: Tune Gradle for CI
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties
      - name: Strip internet permission
        run: chmod +x ./strip_permission.sh && ./strip_permission.sh
      - name: Disable maps
        run: echo "INCLUDE_MAPS=false" >> ./app.properties
      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: 'release_key.jks'
          fileDir: 'app/'
          encodedString: ${{ secrets.SIGNING_KEY }}
      - name: Build Release APK
        run: ./gradlew --build-cache :app:assemble${{ matrix.arch }}WithMLRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      - uses: actions/upload-artifact@v5
        with:
          name: withml-${{ matrix.arch }}
          path: app/build/outputs/apk-renamed/**/*.apk

  build_maps:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        arch: [Arm64-v8a, Armeabi-v7a, X86_64, X86, Universal]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/powershell || true
      - name: Add swap
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
      - name: Tune Gradle for CI
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties
      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: 'release_key.jks'
          fileDir: 'app/'
          encodedString: ${{ secrets.SIGNING_KEY }}
      - name: Build Release APK
        run: ./gradlew --build-cache :app:assemble${{ matrix.arch }}NoMLRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      - uses: actions/upload-artifact@v5
        with:
          name: maps-${{ matrix.arch }}
          path: app/build/outputs/apk-renamed/**/*.apk

  release:
    needs: [prepare, build_nomaps, build_withml, build_maps]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERSION: ${{ needs.prepare.outputs.versionName }}-${{ needs.prepare.outputs.versionCode }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: nomaps-*
          path: artifacts/nomaps
          merge-multiple: true
      - uses: actions/download-artifact@v5
        with:
          pattern: maps-*
          path: artifacts/maps
          merge-multiple: true
      - uses: actions/download-artifact@v5
        with:
          pattern: withml-*
          path: artifacts/withml
          merge-multiple: true
      - name: List downloaded artifacts
        run: find artifacts -name "*.apk" -type f | sort
      - name: Generate SHA256
        run: |
          CHANGELOG="${VERSION}-nightly-changelog.txt"
          echo "### Checksums" >> "$CHANGELOG"
          find artifacts -name "ReFra-*.apk" -type f | sort | while IFS= read -r apk; do
            hash=$(sha256sum "$apk" | awk '{print $1}')
            name=$(basename "$apk")
            echo "**${name}**: \`${hash}\`" >> "$CHANGELOG"
          done
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.VERSION }} Nightly Release
          body_path: ${{ env.VERSION }}-nightly-changelog.txt
          prerelease: true
          tag_name: ${{ env.VERSION }}-nightly
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
